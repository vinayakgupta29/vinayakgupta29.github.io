<!DOCTYPE html>
<html>

<head>
  <title>My Site with On-Load Captcha</title>
  <script src="https://www.google.com/recaptcha/api.js" async defer></script>
  <style>
    #captcha-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: white;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }
  </style>
</head>

<body>
  <div id="captcha-overlay" style="display: none;">
    <div class="g-recaptcha" data-sitekey="YOUR_SITE_KEY" data-callback="captchaPassed">
    </div>
  </div>

  <h1>Welcome to my site!</h1>
  <p>Content goes here...</p>

  <script>
    function getCookie(name) {
      const v = document.cookie.match('(^|;)\\s*' + name + '\\s*=\\s*([^;]+)');
      return v ? v.pop() : null;
    }

    function setCookie(name, value, days) {
      let expires = "";
      if (days) {
        const d = new Date();
        d.setTime(d.getTime() + (days * 24 * 60 * 60 * 1000));
        expires = "; expires=" + d.toUTCString();
      }
      document.cookie = name + "=" + (value || "") + expires + "; path=/";
    }

    function captchaPassed(token) {
      // Verify with your backend
      fetch('/verify-captcha', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({token})
      })
        .then(res => res.json())
        .then(data => {
          if (data.success) {
            setCookie('first_visit_verified', 'yes', 30);
            document.getElementById('captcha-overlay').style.display = 'none';
          } else {
            alert('Captcha failed, try again.');
          }
        });
    }

    // Show captcha overlay on first visit
    window.onload = function () {
      if (!getCookie('first_visit_verified')) {
        document.getElementById('captcha-overlay').style.display = 'flex';
      }
    }
  </script>
</body>

</html>
